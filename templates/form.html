<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User PPPoE</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/logo.png') }}">
  <!-- FontAwesome for Premium Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    /* Reset & Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    /* Desktop Viewport Defaults */
    body {
      height: 100vh;
      background-color: #f8fafc;
      background: radial-gradient(circle at 100% 0%, #eff6ff 0%, #f8fafc 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden; /* Hide page-level scrollbars on laptop */
      color: #1e293b;
    }

    /* Decorative animated backgrounds */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      z-index: -1;
      animation: float 25s infinite alternate ease-in-out;
    }
    .blob-1 {
      width: 400px;
      height: 400px;
      background: #3b82f6;
      top: -10%;
      left: -10%;
    }
    .blob-2 {
      width: 450px;
      height: 450px;
      background: #8b5cf6;
      bottom: -10%;
      right: -10%;
      animation-delay: 5s;
    }
    .blob-3 {
      width: 300px;
      height: 300px;
      background: #f97316;
      top: 45%;
      left: 20%;
      animation-delay: 10s;
    }

    @keyframes float {
      0% { transform: translate(0px, 0px) scale(1); }
      50% { transform: translate(40px, -60px) scale(1.1); }
      100% { transform: translate(-30px, 30px) scale(0.95); }
    }

    /* Split Screen Card Layout */
    .form-container {
      width: 100%;
      max-width: 1300px;
      height: 85vh;
      max-height: 680px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 28px;
      box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.03), 
        0 10px 50px rgba(0, 0, 0, 0.05),
        inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      display: flex;
      overflow: hidden; /* Hide overflow of the main card */
      z-index: 1;
    }

    /* Left Sidebar Panel (branding & info) */
    .form-sidebar {
      width: 35%;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      padding: 40px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .form-sidebar::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("{{ url_for('static', filename='icons/logo.png') }}") no-repeat center;
      background-size: 150%;
      opacity: 0.03;
      pointer-events: none;
    }

    .sidebar-top {
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      align-self: flex-start;
      transition: all 0.25s ease;
    }

    .back-link:hover {
      color: white;
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateX(-3px);
    }

    .sidebar-logo {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    .sidebar-middle {
      margin: 40px 0;
      z-index: 1;
    }

    .sidebar-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-title i {
      font-size: 1.5rem;
      opacity: 0.9;
    }

    .sidebar-subtitle {
      font-size: 0.9rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 400;
    }

    .sidebar-bottom {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 500;
      z-index: 1;
    }

    /* Right Content Panel (the form itself) */
    form.form-content {
      width: 65%;
      padding: 40px;
      overflow-y: auto; /* Enable scroll inside the form content on laptop */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    /* Custom scrollbar for form content */
    form.form-content::-webkit-scrollbar {
      width: 6px;
    }
    form.form-content::-webkit-scrollbar-track {
      background: transparent;
    }
    form.form-content::-webkit-scrollbar-thumb {
      background-color: #cbd5e1;
      border-radius: 20px;
    }
    form.form-content::-webkit-scrollbar-thumb:hover {
      background-color: #94a3b8;
    }

    /* Form Grid Layout */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .form-span-2 {
      grid-column: span 2;
    }

    /* Input Styling Group */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      color: #94a3b8;
      font-size: 1.05rem;
      pointer-events: none;
      transition: color 0.2s ease;
    }

    .lock-icon {
      position: absolute;
      right: 16px;
      color: #94a3b8;
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* Inputs, Selects */
    .input-wrapper input, .input-wrapper select {
      width: 100%;
      padding: 12px 16px 12px 46px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      background-color: #ffffff;
      color: #0f172a;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .input-wrapper input::placeholder {
      color: #cbd5e1;
      font-weight: 400;
    }

    .input-wrapper input:focus, .input-wrapper select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      background-color: #ffffff;
    }

    /* Focused styles */
    .input-group:focus-within label {
      color: #3b82f6;
    }
    
    .input-group:focus-within .input-icon {
      color: #3b82f6;
    }

    /* Readonly (Locked) Fields */
    .input-wrapper input[readonly], .input-wrapper select[readonly] {
      background-color: #f1f5f9;
      color: #64748b;
      border-color: #e2e8f0;
      cursor: not-allowed;
      padding-right: 46px;
    }

    .input-wrapper input[readonly]:focus, .input-wrapper select[readonly]:focus {
      box-shadow: none;
      border-color: #e2e8f0;
    }

    /* Section divider lines */
    .section-divider {
      grid-column: span 2;
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    .section-divider::before, .section-divider::after {
      content: "";
      flex: 1;
      height: 1px;
    }
    .section-divider::before {
      background: linear-gradient(90deg, transparent, #e2e8f0);
    }
    .section-divider::after {
      background: linear-gradient(90deg, #e2e8f0, transparent);
    }

    .section-divider span {
      padding: 0 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Submit Button styling */
    .submit-btn {
      grid-column: span 2;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
      margin-top: 10px;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.35);
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 8px rgba(59, 130, 246, 0.15);
    }

    /* RESPONSIVE DESIGN */

    /* Tablet Landscape & general small laptops (max-height: 720px or max-width: 1024px) */
    @media (max-height: 720px) and (min-width: 1025px) {
      .form-container {
        height: 92vh;
        max-height: none;
      }
    }

    /* Tablet Viewport (max-width: 1024px) */
    @media (max-width: 1024px) {
      body {
        padding: 30px 20px;
        overflow-y: auto;
        height: auto;
      }
      .form-container {
        flex-direction: column;
        height: auto;
        max-height: none;
        max-width: 700px;
      }
      .form-sidebar {
        width: 100%;
        padding: 35px;
        flex-direction: row;
        align-items: center;
        gap: 20px;
      }
      .sidebar-top {
        flex-direction: row;
        align-items: center;
        gap: 20px;
      }
      .sidebar-middle {
        margin: 0;
        flex: 1;
      }
      .sidebar-title {
        font-size: 1.4rem;
        margin-bottom: 4px;
      }
      .sidebar-subtitle {
        font-size: 0.85rem;
      }
      .sidebar-bottom {
        display: none; /* Hide footer on tablet/mobile to save vertical space */
      }
      form.form-content {
        width: 100%;
        padding: 35px;
        overflow-y: visible;
      }
    }

    /* Mobile viewports (max-width: 640px) */
    @media (max-width: 640px) {
      body {
        padding: 16px 12px;
      }
      .form-sidebar {
        flex-direction: column;
        align-items: flex-start;
        padding: 24px;
        gap: 15px;
      }
      .sidebar-top {
        width: 100%;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .back-link {
        padding: 8px 12px;
        font-size: 0.8rem;
      }
      .sidebar-middle {
        width: 100%;
      }
      .sidebar-title {
        font-size: 1.25rem;
      }
      form.form-content {
        padding: 24px 16px;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .form-span-2, .section-divider, .submit-btn {
        grid-column: span 1;
      }
      .input-wrapper input, .input-wrapper select {
        padding: 12px 12px 12px 42px;
        font-size: 0.9rem;
        border-radius: 11px;
      }
      .input-icon {
        left: 14px;
        font-size: 1rem;
      }
      .lock-icon {
        right: 14px;
        font-size: 0.85rem;
      }
      .section-divider span {
        font-size: 0.75rem;
      }
      .submit-btn {
        padding: 14px 20px;
        font-size: 0.95rem;
        border-radius: 11px;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Background Blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="form-container">
    <!-- Left Side: Sidebar/Info -->
    <div class="form-sidebar">
      <div class="sidebar-top">
        <a href="/admin" class="back-link">
          <i class="fas fa-arrow-left"></i> Kembali
        </a>
      </div>
      
      <div class="sidebar-middle">
        <h2 class="sidebar-title">
          <span>
            <i class="fas {{ 'fa-user-edit' if pppoe else 'fa-user-plus' }}"></i>
          </span>
          {{ 'Edit' if pppoe else 'Tambah' }} PPPoE
        </h2>
        <p class="sidebar-subtitle">
          {{ 'Perbarui data detail pelanggan PPPoE' if pppoe else 'Daftarkan pengguna PPPoE baru ke antrean MikroTik' }}
        </p>
      </div>
      
      <div class="sidebar-bottom">
        <p class="sidebar-footer">&copy; 2026 PPPoE Monitoring</p>
      </div>
    </div>

    <!-- Right Side: Scrollable Form Inputs -->
    <form method="post" class="form-content">
      <div class="form-grid">
        <!-- Target Router -->
        <div class="input-group">
          <label for="router_name">Target Router MikroTik</label>
          <div class="input-wrapper">
            <i class="fas fa-server input-icon"></i>
            <input type="text" name="router_name" id="router_name" value="{{ pppoe.router or '' }}" placeholder="Nama router MikroTik" required readonly>
            <i class="fas fa-lock lock-icon"></i>
          </div>
        </div>

        <!-- Username PPPoE -->
        <div class="input-group">
          <label for="username_pppoe">Username PPPoE</label>
          <div class="input-wrapper">
            <i class="fas fa-user-cog input-icon"></i>
            <input type="text" name="username_pppoe" id="username_pppoe" value="{{ pppoe.user or '' }}" placeholder="Contoh: wilayah-namapelanggan" {% if pppoe %}readonly{% else %}required{% endif %}>
            {% if pppoe %}
              <i class="fas fa-lock lock-icon"></i>
            {% endif %}
          </div>
        </div>

        <!-- Section 1: Customer Details -->
        <div class="section-divider">
          <span><i class="fas fa-id-card"></i> Identitas & Lokasi</span>
        </div>

        <!-- ID Pelanggan -->
        <div class="input-group">
            <label for="id_pelanggan">ID Unik</label>
          <div class="input-wrapper">
            <i class="fas fa-hashtag input-icon"></i>
            <input type="text" name="id_pelanggan" id="id_pelanggan" value="{{ pppoe.id or '' }}" placeholder="ID Pelanggan MikroTik" required>
          </div>
        </div>

        <!-- Alamat Lengkap -->
        <div class="input-group">
            <label for="lokasi">Lokasi / Alamat Lengkap</label>
          <div class="input-wrapper">
            <i class="fas fa-map-marker-alt input-icon"></i>
            <input type="text" name="lokasi" id="lokasi" value="{{ pppoe.lokasi or '' }}" placeholder="Tulis alamat atau nama jalan lengkap" required>
          </div>
        </div>

        <!-- Section 2: Geospatial & IP Config -->
        <div class="section-divider">
          <span><i class="fas fa-globe"></i> Jaringan & Koordinat</span>
        </div>

        <!-- IP Address -->
        <div class="input-group">
          <label for="ip">IP Address Remote</label>
          <div class="input-wrapper">
            <i class="fas fa-network-wired input-icon"></i>
            <input type="text" name="ip" id="ip" value="{{ pppoe.ip or '' }}" placeholder="Contoh: 10.239.0.138">
          </div>
        </div>

        <!-- Profile PPP -->
        <div class="input-group">
          <label for="profile">Profile PPP MikroTik</label>
          <div class="input-wrapper">
            <i class="fas fa-tachometer-alt input-icon"></i>
            <input type="text" name="profile" id="profile" value="{{ pppoe.profile or '' }}" placeholder="Nama profile sesuai MikroTik">
          </div>
        </div>

        <!-- Latitude -->
        <div class="input-group">
          <label for="latitude">Latitude</label>
          <div class="input-wrapper">
            <i class="fas fa-compass input-icon"></i>
            <input type="number" step="any" name="latitude" id="latitude" value="{{ pppoe.latitude or '' }}" placeholder="Contoh: -7.8268711">
          </div>
        </div>

        <!-- Longitude -->
        <div class="input-group">
          <label for="longitude">Longitude</label>
          <div class="input-wrapper">
            <i class="fas fa-compass input-icon"></i>
            <input type="number" step="any" name="longitude" id="longitude" value="{{ pppoe.longitude or '' }}" placeholder="Contoh: 110.3739738">
          </div>
        </div>

        <!-- Section 3: Credentials Security -->
        <div class="section-divider">
          <span><i class="fas fa-shield-alt"></i> Keamanan Kredensial</span>
        </div>

        <!-- Password -->
        <div class="input-group form-span-2">
          <label for="password">Password PPPoE</label>
          <div class="input-wrapper">
            <i class="fas fa-key input-icon"></i>
            <input type="text" name="password" id="password" value="{{ pppoe.password or '' }}" placeholder="Ketik ulang password jika ingin mengganti" {% if not pppoe %}required{% endif %}>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn">
          <i class="fas fa-save"></i>
          Simpan ke Antrean MikroTik
        </button>
      </div>
    </form>
  </div>
</body>
</html>
